name: DevOps Pipeline

on:
 push:
   branches: [ main ]

jobs:

 build:

  runs-on: ubuntu-latest

  steps:

  - uses: actions/checkout@v3

  - name: Build Docker Image
    run: docker build -t yourdockerhub/devops-bluegreen-app:latest ./app

  - name: Login DockerHub
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u yourdockerhub --password-stdin

  - name: Push Image
    run: docker push yourdockerhub/devops-bluegreen-app:latest

  - name: Run Ansible Deployment
    run: ansible-playbook ansible/deploy.yml -i ansible/inventory
